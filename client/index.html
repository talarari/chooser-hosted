<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chooser" />
  <title>Chooser — multiplayer finger picker</title>
  <meta name="description" content="Finger chooser that works across devices. One shared room on the server, everyone holds a finger, one gets picked." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="landing">
    <!-- Tap mark: a pointing hand under a little burst of brand-colored rays. -->
    <span class="logo-mark" aria-hidden="true">
      <svg viewBox="-3 -8 30 34" fill="none">
        <g class="rays" stroke-width="1.7" stroke-linecap="round">
          <line x1="8" y1="-2" x2="8" y2="-6" stroke="#ffb820" />
          <line x1="3.5" y1="-0.5" x2="1" y2="-4" stroke="#ff3b6b" />
          <line x1="12.5" y1="-0.5" x2="15" y2="-4" stroke="#27e0a6" />
          <line x1="0.5" y1="3" x2="-3" y2="1.5" stroke="#a06bff" />
          <line x1="15.5" y1="3" x2="19" y2="1.5" stroke="#2fb5ff" />
        </g>
        <g stroke="#e8eaf2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 11V9a2 2 0 0 0-2-2 2 2 0 0 0-2 2" />
          <path d="M10 9.5V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v10" />
          <path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 19" />
          <path d="M18 11v-1a2 2 0 0 0-2-2 2 2 0 0 0-2 2v1" />
        </g>
      </svg>
    </span>
    <h1>Chooser</h1>
    <p class="tagline">Everyone holds a finger on their screen.<br />One finger gets picked. Works across devices.</p>
    <button id="new-room" class="primary">Start a room</button>
    <div class="or-divider"><span>or</span></div>
    <form id="join-form" autocomplete="off">
      <input id="join-code" placeholder="ROOM CODE" maxlength="4" spellcheck="false" autocapitalize="characters" />
      <button type="submit" class="join-btn">Join</button>
    </form>
    <div class="name-field">
      <span class="name-field-label">Your name</span>
      <button id="name-landing" class="name-chip" title="Tap to change your name"></button>
    </div>
    <div id="install-bar" hidden>
      <button id="install-btn">Add to home screen</button>
    </div>
  </main>

  <div id="app" hidden>
    <canvas id="stage"></canvas>
    <header id="hud">
      <div class="hud-top">
        <button id="home-btn" title="Back to home" aria-label="Back to home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5" />
            <path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5" />
          </svg>
        </button>
        <button id="room-pill" title="Copy invite link">
          <span class="pill-label">Room</span>
          <span id="room-code"></span>
          <span id="copy-state">⧉</span>
        </button>
        <button id="name-pill" class="name-chip" title="Change your name"></button>
      </div>
      <span id="peer-count"></span>
      <div id="mode-bar">
        <button id="mode-toggle" class="mode-chip" title="Switch between picking winners and dividing fingers into groups">Winners</button>
        <div id="count-stepper">
          <button id="count-dec" class="step-btn" aria-label="Fewer">−</button>
          <span id="count-label">1 winner</span>
          <button id="count-inc" class="step-btn" aria-label="More">+</button>
        </div>
      </div>
    </header>
    <div id="banner" hidden></div>
    <p id="tip">Touch and hold with at least two fingers — across any devices in the room</p>
  </div>

  <div id="err" hidden></div>
  <script type="module" src="app.js"></script>
</body>
</html>
